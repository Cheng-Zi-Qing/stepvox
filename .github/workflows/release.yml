name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            > **Note on `setInterval` warning:** The only `setInterval` in this plugin rotates the local debug log file once every 24 hours. It performs no network calls and transmits no data.
          files: |
            main.js
            manifest.json
            styles.css
